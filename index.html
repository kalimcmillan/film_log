<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Journal - Your Analog Photography Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#fdfcf9',
                        page: '#f5f3f0',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono {
            font-family: 'Space Mono', monospace;
        }
        
        .paper-texture {
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIGJhc2VGcmVxdWVuY3k9Ii43NSIgc3RpdGNoVGlsZXM9InN0aXRjaCIgdHlwZT0iZnJhY3RhbE5vaXNlIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxwYXRoIGQ9Ik0wIDBoMzAwdjMwMEgweiIgZmlsdGVyPSJ1cmwoI2EpIiBvcGFjaXR5PSIuMDUiLz48L3N2Zz4=');
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .sidebar.mobile-open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-[#f5f3f0]">
    <!-- Page texture -->
    <div class="fixed inset-0 opacity-[0.015] pointer-events-none paper-texture"></div>

    <!-- App Container -->
    <div id="app" class="flex min-h-screen relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 bg-[#fdfcf9] border-r border-neutral-300 fixed md:relative h-screen z-50">
            <div class="p-6 border-b border-neutral-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-neutral-800 rounded flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fdfcf9" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                        </svg>
                    </div>
                    <div>
                        <h2 class="font-medium text-neutral-900">Film Journal</h2>
                        <p class="text-xs text-neutral-500">Queen of the Grain</p>
                    </div>
                </div>
            </div>

            <nav class="p-3">
                <div class="space-y-1" id="nav-menu"></div>
            </nav>

            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-neutral-200">
                <button onclick="exportData()" class="w-full px-3 py-2 text-xs uppercase tracking-widest text-neutral-600 hover:text-neutral-900 border border-neutral-300 rounded hover:bg-neutral-50 mb-2">
                    Export Data
                </button>
                <button onclick="clearAllData()" class="w-full px-3 py-2 text-xs uppercase tracking-widest text-red-600 hover:text-red-700 border border-red-300 rounded hover:bg-red-50">
                    Clear All Data
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto md:ml-0">
            <!-- Mobile Header -->
            <header class="md:hidden bg-[#fdfcf9] border-b border-neutral-200 p-4 flex items-center justify-between">
                <button onclick="toggleMobileNav()" class="p-2 hover:bg-neutral-100 rounded">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="text-lg font-medium">Film Journal</h1>
                <div class="w-10"></div>
            </header>

            <!-- Page Content -->
            <div id="page-content" class="p-4 md:p-8"></div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modals"></div>

    <script>
        // Data Storage Manager
        class DataStore {
            constructor() {
                this.initialize();
            }

            initialize() {
                if (!localStorage.getItem('filmjournal_cameras')) {
                    localStorage.setItem('filmjournal_cameras', JSON.stringify([]));
                }
                if (!localStorage.getItem('filmjournal_rolls')) {
                    localStorage.setItem('filmjournal_rolls', JSON.stringify([]));
                }
                if (!localStorage.getItem('filmjournal_inventory')) {
                    localStorage.setItem('filmjournal_inventory', JSON.stringify([]));
                }
                if (!localStorage.getItem('filmjournal_shots')) {
                    localStorage.setItem('filmjournal_shots', JSON.stringify([]));
                }
                if (!localStorage.getItem('filmjournal_recipes')) {
                    localStorage.setItem('filmjournal_recipes', JSON.stringify([]));
                }
            }

            get(key) {
                return JSON.parse(localStorage.getItem('filmjournal_' + key) || '[]');
            }

            set(key, data) {
                localStorage.setItem('filmjournal_' + key, JSON.stringify(data));
            }

            add(key, item) {
                const data = this.get(key);
                item.id = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                item.created_at = new Date().toISOString();
                data.push(item);
                this.set(key, data);
                return item;
            }

            update(key, id, updates) {
                const data = this.get(key);
                const index = data.findIndex(item => item.id === id);
                if (index !== -1) {
                    data[index] = { ...data[index], ...updates };
                    this.set(key, data);
                    return data[index];
                }
                return null;
            }

            delete(key, id) {
                const data = this.get(key);
                const filtered = data.filter(item => item.id !== id);
                this.set(key, filtered);
            }

            clear() {
                localStorage.removeItem('filmjournal_cameras');
                localStorage.removeItem('filmjournal_rolls');
                localStorage.removeItem('filmjournal_inventory');
                localStorage.removeItem('filmjournal_shots');
                localStorage.removeItem('filmjournal_recipes');
                this.initialize();
            }
        }

        const db = new DataStore();
        let currentPage = 'dashboard';
        let currentRollId = null;

        // Navigation
        const pages = [
            { id: 'dashboard', name: 'Dashboard', icon: '📊' },
            { id: 'cameras', name: 'Cameras', icon: '📷' },
            { id: 'active-rolls', name: 'Active Rolls', icon: '🎞️' },
            { id: 'inventory', name: 'Inventory', icon: '📦' },
            { id: 'archive', name: 'Archive', icon: '🗄️' },
            { id: 'soup-recipes', name: 'Soup Recipes', icon: '🧪' }
        ];

        function toggleMobileNav() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        }

        function renderNav() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = pages.map(page => `
                <button 
                    onclick="navigateTo('${page.id}')"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-left ${
                        currentPage === page.id 
                            ? 'bg-neutral-100 text-neutral-900 font-medium' 
                            : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }"
                >
                    <span class="text-lg">${page.icon}</span>
                    <span class="text-sm tracking-wide">${page.name}</span>
                </button>
            `).join('');
        }

        function navigateTo(pageId, params = {}) {
            currentPage = pageId;
            if (params.rollId) currentRollId = params.rollId;
            renderNav();
            renderPage();
            // Close mobile nav after navigation
            document.getElementById('sidebar').classList.remove('mobile-open');
        }

        function getCameraName(cameraId) {
            const camera = db.get('cameras').find(c => c.id === cameraId);
            return camera ? `${camera.brand} ${camera.model}` : 'Unknown Camera';
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function generateRollNumber() {
            const year = new Date().getFullYear();
            const rolls = db.get('rolls');
            const rollsThisYear = rolls.filter(r => r.roll_number && r.roll_number.startsWith(year.toString()));
            const nextNum = rollsThisYear.length + 1;
            return `${year}-${String(nextNum).padStart(3, '0')}`;
        }

        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function hideModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function exportData() {
            const data = {
                cameras: db.get('cameras'),
                rolls: db.get('rolls'),
                inventory: db.get('inventory'),
                shots: db.get('shots'),
                recipes: db.get('recipes'),
                exportDate: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `film-journal-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function clearAllData() {
            if (confirm('Are you sure? This will delete ALL your data permanently!')) {
                if (confirm('Really sure? This cannot be undone!')) {
                    db.clear();
                    alert('All data cleared!');
                    renderPage();
                }
            }
        }

        // Page Renderers
        function renderPage() {
            const content = document.getElementById('page-content');
            
            switch(currentPage) {
                case 'dashboard':
                    content.innerHTML = renderDashboard();
                    break;
                case 'cameras':
                    content.innerHTML = renderCameras();
                    break;
                case 'active-rolls':
                    content.innerHTML = renderActiveRolls();
                    break;
                case 'inventory':
                    content.innerHTML = renderInventory();
                    break;
                case 'archive':
                    content.innerHTML = renderArchive();
                    break;
                case 'soup-recipes':
                    content.innerHTML = renderSoupRecipes();
                    break;
                case 'roll-detail':
                    content.innerHTML = renderRollDetail();
                    break;
            }
        }

        function renderDashboard() {
            const cameras = db.get('cameras');
            const rolls = db.get('rolls').filter(r => r.status === 'loaded');
            const allRolls = db.get('rolls');
            const completed = allRolls.filter(r => r.status === 'completed' || r.status === 'developed');
            
            return `
                <div class="max-w-6xl mx-auto relative">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-3xl md:text-4xl font-medium text-neutral-900 tracking-tight">Dashboard</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Your analogue photography journal</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        ${renderStatCard('📷', cameras.length, 'Cameras', 'in collection', 'fuchsia')}
                        ${renderStatCard('🎞️', rolls.length, 'Active Rolls', 'currently loaded', 'neutral')}
                        ${renderStatCard('🗄️', completed.length, 'Completed', 'archived', 'neutral')}
                    </div>

                    ${rolls.length === 0 && cameras.length === 0 ? `
                        <div class="border border-neutral-300 bg-gradient-to-br from-[#fdfcf9] to-fuchsia-50/20 rounded-lg p-8 relative">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-fuchsia-100 rounded-full blur-3xl opacity-20"></div>
                            <div class="relative flex items-start gap-4">
                                <div class="w-12 h-12 bg-fuchsia-500 rounded-full flex items-center justify-center text-2xl flex-shrink-0">
                                    📷
                                </div>
                                <div>
                                    <h3 class="text-xl font-medium text-neutral-900 mb-2">Welcome to Film Journal!</h3>
                                    <p class="text-neutral-600 mb-4">Start by adding your first camera to begin tracking your analog photography journey.</p>
                                    <button onclick="showAddCameraModal()" class="px-4 py-2 bg-neutral-900 text-white rounded-md text-xs uppercase tracking-widest font-medium hover:bg-neutral-800">
                                        Add Your First Camera
                                    </button>
                                </div>
                            </div>
                        </div>
                    ` : `
                        <div class="mt-10">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-1 h-8 bg-neutral-800 rounded-full"></div>
                                <div>
                                    <h2 class="text-xl font-medium text-neutral-900">Active Film Rolls</h2>
                                    <p class="text-xs text-neutral-500 mt-0.5">Currently loaded and shooting</p>
                                </div>
                            </div>
                            
                            ${rolls.length === 0 ? `
                                <div class="border-2 border-dashed border-neutral-300 bg-[#fdfcf9] rounded-lg p-12 text-center">
                                    <div class="text-6xl mb-4">🎞️</div>
                                    <p class="text-neutral-500 mb-4">No active film rolls</p>
                                    <button onclick="navigateTo('active-rolls')" class="px-4 py-2 border border-neutral-900 rounded-md hover:bg-neutral-900 hover:text-white transition-all text-xs uppercase tracking-widest font-medium">
                                        Load Your First Roll
                                    </button>
                                </div>
                            ` : `
                                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    ${rolls.map(roll => renderActiveRollCard(roll)).join('')}
                                </div>
                            `}
                        </div>
                    `}
                </div>
            `;
        }

        function renderStatCard(icon, count, label, sublabel, color) {
            const colors = color === 'fuchsia' 
                ? 'bg-fuchsia-50 text-fuchsia-600 ring-fuchsia-500 border-fuchsia-500'
                : 'bg-neutral-100 text-neutral-700 ring-neutral-700 border-neutral-700';
                
            return `
                <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-6 relative hover:shadow-md transition-shadow">
                    <div class="absolute inset-0 opacity-[0.02] pointer-events-none paper-texture"></div>
                    <div class="relative">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-14 h-14 ${colors.split(' ')[0]} rounded-full flex items-center justify-center ring-2 ring-offset-2 ring-offset-[#fdfcf9] ${colors.split(' ')[2]} ring-opacity-20 text-2xl">
                                ${icon}
                            </div>
                            <div class="px-2 py-0.5 border ${colors.split(' ')[3]} rounded-full rotate-3 opacity-40">
                                <div class="w-2 h-2 rounded-full bg-current"></div>
                            </div>
                        </div>
                        <div class="text-4xl font-bold text-neutral-900 font-mono mb-1">${count}</div>
                        <p class="text-sm font-medium text-neutral-700 uppercase tracking-widest mb-0.5">${label}</p>
                        <p class="text-xs text-neutral-500 font-light tracking-wide">${sublabel}</p>
                    </div>
                </div>
            `;
        }

        function renderActiveRollCard(roll) {
            const progress = (roll.frames_shot / roll.total_frames) * 100;
            const remaining = roll.total_frames - roll.frames_shot;
            
            return `
                <button onclick="navigateTo('roll-detail', {rollId: '${roll.id}'})" class="group border border-neutral-300 bg-[#fdfcf9] rounded-lg overflow-hidden relative hover:shadow-lg transition-all text-left w-full">
                    <div class="absolute left-0 top-0 bottom-0 w-3 bg-neutral-800 flex flex-col justify-around py-3 z-10">
                        ${Array(8).fill(0).map(() => '<div class="w-2 h-2 bg-[#fdfcf9] rounded-full mx-auto"></div>').join('')}
                    </div>
                    
                    <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                    
                    <div class="pl-6 pr-4 pt-4 pb-5 relative">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                ${roll.roll_number ? `
                                    <div class="mb-2 inline-flex items-center gap-1.5 px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                        <span class="text-fuchsia-400">→</span>
                                        ${roll.roll_number}
                                    </div>
                                ` : ''}
                                <h3 class="text-lg font-medium text-neutral-900 mb-1">${roll.film_stock}</h3>
                                <p class="text-sm text-neutral-500 font-light">${getCameraName(roll.camera_id)}</p>
                            </div>
                            <div class="px-2.5 py-1 border-2 border-fuchsia-500 rounded-full text-fuchsia-600 font-mono text-xs font-bold tracking-wide rotate-2">
                                ISO ${roll.iso}
                            </div>
                        </div>
                        
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs uppercase tracking-widest text-neutral-400 font-medium">Frames</span>
                                <div class="flex items-baseline gap-1">
                                    <span class="font-mono text-xl font-bold text-neutral-900">${roll.frames_shot || 0}</span>
                                    <span class="text-neutral-400 font-mono text-sm">/ ${roll.total_frames}</span>
                                </div>
                            </div>
                            
                            <div class="relative h-8 bg-neutral-200 rounded overflow-hidden border border-neutral-300">
                                <div class="absolute inset-y-0 left-0 bg-gradient-to-r from-neutral-700 to-neutral-800" style="width: ${progress}%"></div>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span class="text-[10px] font-mono text-neutral-400 font-medium tracking-wider">${remaining} REMAINING</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </button>
            `;
        }

        // CAMERAS PAGE
        function renderCameras() {
            const cameras = db.get('cameras');
            
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-3xl md:text-4xl font-medium text-neutral-900 tracking-tight">Camera Library</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Manage your camera collection</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                        <button onclick="showAddCameraModal()" class="px-4 py-2 bg-neutral-900 text-white rounded-md hover:bg-neutral-800 text-xs uppercase tracking-widest font-medium flex items-center gap-2">
                            <span>+</span>
                            Add Camera
                        </button>
                    </div>
                    
                    ${cameras.length === 0 ? `
                        <div class="border-2 border-dashed border-neutral-300 bg-[#fdfcf9] rounded-lg p-16 text-center">
                            <div class="text-6xl mb-4">📷</div>
                            <h3 class="text-lg font-medium text-neutral-900 mb-2">No cameras yet</h3>
                            <p class="text-neutral-500 mb-6">Add your first camera to start tracking film rolls</p>
                            <button onclick="showAddCameraModal()" class="px-4 py-2 border border-neutral-900 rounded-md hover:bg-neutral-900 hover:text-white transition-all text-xs uppercase tracking-widest font-medium">
                                Add Your First Camera
                            </button>
                        </div>
                    ` : `
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${cameras.map(camera => renderCameraCard(camera)).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        function renderCameraCard(camera) {
            return `
                <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-6 relative hover:shadow-md transition-all">
                    <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                    <div class="absolute top-0 left-0 right-0 h-1 bg-neutral-800"></div>
                    
                    <div class="relative">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <h3 class="text-xl font-medium text-neutral-900 mb-1">${camera.brand} ${camera.model}</h3>
                                <div class="inline-flex items-center px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                    ${camera.format}
                                </div>
                            </div>
                            <div class="w-12 h-12 bg-neutral-100 rounded-full flex items-center justify-center text-2xl">
                                📷
                            </div>
                        </div>
                        
                        ${camera.notes ? `
                            <div class="mb-4 pb-4 border-b border-neutral-200">
                                <p class="text-sm text-neutral-600 italic">"${camera.notes}"</p>
                            </div>
                        ` : ''}
                        
                        <div class="flex gap-2">
                            <button onclick="editCamera('${camera.id}')" class="flex-1 px-3 py-2 border border-neutral-300 rounded hover:bg-neutral-50 text-xs uppercase tracking-widest font-medium">
                                Edit
                            </button>
                            <button onclick="deleteCamera('${camera.id}')" class="px-3 py-2 border border-red-300 text-red-600 rounded hover:bg-red-50 text-xs uppercase tracking-widest font-medium">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Camera CRUD
        function showAddCameraModal() {
            document.getElementById('modals').innerHTML = `
                <div id="cameraModal" class="modal active">
                    <div class="bg-[#fdfcf9] rounded-lg p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
                        <h2 class="text-2xl font-medium mb-6">Add Camera</h2>
                        <form onsubmit="saveCamera(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Brand</label>
                                <input type="text" id="camera-brand" required class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent" placeholder="e.g., Canon, Nikon">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Model</label>
                                <input type="text" id="camera-model" required class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent" placeholder="e.g., AE-1, F3">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Format</label>
                                <select id="camera-format" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent">
                                    <option>35mm</option>
                                    <option>Medium Format 120</option>
                                    <option>Medium Format 220</option>
                                    <option>Large Format 4x5</option>
                                    <option>Half Frame</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Notes (Optional)</label>
                                <textarea id="camera-notes" rows="3" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500 focus:border-transparent" placeholder="Any special notes about this camera..."></textarea>
                            </div>

            const shots = db.get('shots').filter(s => s.roll_id === currentRollId);
            const nextFrame = shots.length + 1;
            
            document.getElementById('modals').innerHTML = `
                <div id="shotModal" class="modal active">
                    <div class="bg-[#fdfcf9] rounded-lg p-6 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
                        <h2 class="text-2xl font-medium mb-6">Log Frame #${nextFrame}</h2>
                        <form onsubmit="saveShot(event, ${nextFrame})" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Subject</label>
                                <input type="text" id="shot-subject" placeholder="Brief description" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-neutral-700 mb-1">Aperture</label>
                                    <input type="text" id="shot-aperture" placeholder="f/2.8" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-neutral-700 mb-1">Shutter Speed</label>
                                    <input type="text" id="shot-speed" placeholder="1/125" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Location</label>
                                <input type="text" id="shot-location" placeholder="Where was this taken?" class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-neutral-700 mb-1">Notes</label>
                                <textarea id="shot-notes" rows="2" placeholder="Any additional notes..." class="w-full px-3 py-2 border border-neutral-300 rounded focus:ring-2 focus:ring-fuchsia-500"></textarea>
                            </div>
                            <div class="flex gap-3 justify-end pt-2">
                                <button type="button" onclick="hideModal('shotModal')" class="px-4 py-2 border border-neutral-300 rounded hover:bg-neutral-50 text-xs uppercase tracking-widest font-medium">
                                    Cancel
                                </button>
                                <button type="submit" class="px-4 py-2 bg-neutral-900 text-white rounded hover:bg-neutral-800 text-xs uppercase tracking-widest font-medium">
                                    Log Shot
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function saveShot(event, frameNumber) {
            event.preventDefault();
            
            const shot = {
                roll_id: currentRollId,
                frame_number: frameNumber,
                subject: document.getElementById('shot-subject').value,
                aperture: document.getElementById('shot-aperture').value,
                shutter_speed: document.getElementById('shot-speed').value,
                location: document.getElementById('shot-location').value,
                notes: document.getElementById('shot-notes').value,
                shot_date: new Date().toISOString().split('T')[0]
            };
            
            db.add('shots', shot);
            
            // Update roll frames_shot
            db.update('rolls', currentRollId, { frames_shot: frameNumber });
            
            hideModal('shotModal');
            renderPage();
        }

        function markComplete(rollId) {
            if (confirm('Mark this roll as completed?')) {
                db.update('rolls', rollId, { 
                    status: 'completed',
                    completed_date: new Date().toISOString().split('T')[0]
                });
                renderPage();
            }
        }

        // Initialize app
        renderNav();
        renderPage();
    </script>
</body>
</html>

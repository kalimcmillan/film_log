<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Journal - Analog Photography Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#fdfcf9',
                        page: '#f5f3f0',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono {
            font-family: 'Space Mono', monospace;
        }
        
        .paper-texture {
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIGJhc2VGcmVxdWVuY3k9Ii43NSIgc3RpdGNoVGlsZXM9InN0aXRjaCIgdHlwZT0iZnJhY3RhbE5vaXNlIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxwYXRoIGQ9Ik0wIDBoMzAwdjMwMEgweiIgZmlsdGVyPSJ1cmwoI2EpIiBvcGFjaXR5PSIuMDUiLz48L3N2Zz4=');
        }
    </style>
</head>
<body class="bg-[#f5f3f0]">
    <!-- Page texture overlay -->
    <div class="fixed inset-0 opacity-[0.015] pointer-events-none paper-texture"></div>

    <!-- App Container -->
    <div id="app" class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#fdfcf9] border-r border-neutral-300 hidden md:block">
            <div class="p-6 border-b border-neutral-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-neutral-800 rounded flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fdfcf9" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                        </svg>
                    </div>
                    <div>
                        <h2 class="font-medium text-neutral-900">Film Journal</h2>
                        <p class="text-xs text-neutral-500">Queen of the Grain</p>
                    </div>
                </div>
            </div>

            <nav class="p-3">
                <div class="space-y-1" id="nav-menu"></div>
            </nav>

            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-neutral-200">
                <p class="text-xs text-neutral-500 text-center">Demo Version</p>
                <p class="text-xs text-neutral-400 text-center mt-1">Built with ❤️ for film photographers</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Mobile Header -->
            <header class="md:hidden bg-[#fdfcf9] border-b border-neutral-200 p-4">
                <h1 class="text-lg font-medium">Film Journal</h1>
            </header>

            <!-- Page Content -->
            <div id="page-content" class="p-8"></div>
        </main>
    </div>

    <script>
        // Mock Data
        const mockData = {
            cameras: [
                { id: '1', brand: 'Canon', model: 'AE-1 Program', format: '35mm', notes: 'My first film camera. Bought from eBay in great condition.' },
                { id: '2', brand: 'Nikon', model: 'F3', format: '35mm', notes: 'Professional workhorse. Heavy but reliable.' },
                { id: '3', brand: 'Olympus', model: 'Mju II', format: '35mm', notes: 'Compact point-and-shoot for casual shooting.' }
            ],
            activeRolls: [
                { id: '1', roll_number: '2026-001', film_stock: 'Kodak Portra 400', camera_id: '1', iso: 400, total_frames: 36, frames_shot: 18, status: 'loaded' },
                { id: '2', roll_number: '2026-002', film_stock: 'Ilford HP5 Plus', camera_id: '2', iso: 400, total_frames: 36, frames_shot: 4, status: 'loaded' }
            ],
            inventory: [
                { id: '1', film_stock: 'Kodak Portra 400', iso: 400, format: '35mm', quantity: 5, frames_per_roll: 36 },
                { id: '2', film_stock: 'Ilford HP5 Plus', iso: 400, format: '35mm', quantity: 3, frames_per_roll: 36 },
                { id: '3', film_stock: 'Cinestill 800T', iso: 800, format: '35mm', quantity: 2, frames_per_roll: 36 }
            ],
            archive: [
                { id: '3', roll_number: '2024-012', film_stock: 'Kodak Portra 400', camera_id: '1', iso: 400, total_frames: 36, frames_shot: 36, status: 'developed', completed_date: '2024-12-15' },
                { id: '4', roll_number: '2024-011', film_stock: 'Ilford HP5 Plus', camera_id: '2', iso: 400, total_frames: 36, frames_shot: 36, status: 'completed', completed_date: '2024-12-10' }
            ],
            soupRecipes: [
                { 
                    id: '1', 
                    name: 'Tomato Red', 
                    color_result: 'Red tint',
                    soak_time_minutes: 120,
                    dry_time_hours: 24,
                    ingredients: [
                        { item: 'boiling water', amount: '1 cup' },
                        { item: 'tomato food', amount: '2 tablespoons' },
                        { item: 'lemon juice', amount: '2 teaspoons' }
                    ],
                    film_types: ['Color negative', 'B&W'],
                    favorite: true,
                    notes: 'Creates beautiful red tones. Make sure film is completely dry before shooting.'
                }
            ]
        };

        // Navigation
        const pages = [
            { id: 'dashboard', name: 'Dashboard', icon: '📊' },
            { id: 'cameras', name: 'Cameras', icon: '📷' },
            { id: 'active-rolls', name: 'Active Rolls', icon: '🎞️' },
            { id: 'inventory', name: 'Inventory', icon: '📦' },
            { id: 'archive', name: 'Archive', icon: '🗄️' },
            { id: 'soup-recipes', name: 'Soup Recipes', icon: '🧪' }
        ];

        let currentPage = 'dashboard';

        function renderNav() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = pages.map(page => `
                <button 
                    onclick="navigateTo('${page.id}')"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-left ${
                        currentPage === page.id 
                            ? 'bg-neutral-100 text-neutral-900 font-medium' 
                            : 'text-neutral-600 hover:bg-neutral-50 hover:text-neutral-900'
                    }"
                >
                    <span class="text-lg">${page.icon}</span>
                    <span class="text-sm tracking-wide">${page.name}</span>
                </button>
            `).join('');
        }

        function navigateTo(pageId) {
            currentPage = pageId;
            renderNav();
            renderPage();
        }

        function getCameraName(cameraId) {
            const camera = mockData.cameras.find(c => c.id === cameraId);
            return camera ? `${camera.brand} ${camera.model}` : 'Unknown Camera';
        }

        function renderPage() {
            const content = document.getElementById('page-content');
            
            switch(currentPage) {
                case 'dashboard':
                    content.innerHTML = renderDashboard();
                    break;
                case 'cameras':
                    content.innerHTML = renderCameras();
                    break;
                case 'active-rolls':
                    content.innerHTML = renderActiveRolls();
                    break;
                case 'inventory':
                    content.innerHTML = renderInventory();
                    break;
                case 'archive':
                    content.innerHTML = renderArchive();
                    break;
                case 'soup-recipes':
                    content.innerHTML = renderSoupRecipes();
                    break;
            }
        }

        function renderDashboard() {
            const totalRolls = mockData.activeRolls.length;
            const completedRolls = mockData.archive.length;
            
            return `
                <div class="max-w-6xl mx-auto relative">
                    <!-- Header -->
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Dashboard</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Your analogue photography journal</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        ${renderStatCard('📷', mockData.cameras.length, 'Cameras', 'in collection', 'fuchsia')}
                        ${renderStatCard('🎞️', totalRolls, 'Active Rolls', 'currently loaded', 'neutral')}
                        ${renderStatCard('🗄️', completedRolls, 'Completed', 'archived', 'neutral')}
                    </div>

                    <!-- Active Rolls -->
                    <div class="mt-10">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-1 h-8 bg-neutral-800 rounded-full"></div>
                            <div>
                                <h2 class="text-xl font-medium text-neutral-900">Active Film Rolls</h2>
                                <p class="text-xs text-neutral-500 mt-0.5">Currently loaded and shooting</p>
                            </div>
                        </div>
                        
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${mockData.activeRolls.map(roll => renderActiveRollCard(roll)).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatCard(icon, count, label, sublabel, color) {
            const colors = color === 'fuchsia' 
                ? 'bg-fuchsia-50 text-fuchsia-600 ring-fuchsia-500 border-fuchsia-500'
                : 'bg-neutral-100 text-neutral-700 ring-neutral-700 border-neutral-700';
                
            return `
                <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-6 relative hover:shadow-md transition-shadow">
                    <div class="absolute inset-0 opacity-[0.02] pointer-events-none paper-texture"></div>
                    <div class="relative">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-14 h-14 ${colors.split(' ')[0]} rounded-full flex items-center justify-center ring-2 ring-offset-2 ring-offset-[#fdfcf9] ${colors.split(' ')[2]} ring-opacity-20 text-2xl">
                                ${icon}
                            </div>
                            <div class="px-2 py-0.5 border ${colors.split(' ')[3]} rounded-full rotate-3 opacity-40">
                                <div class="w-2 h-2 rounded-full bg-current"></div>
                            </div>
                        </div>
                        <div class="text-4xl font-bold text-neutral-900 font-mono mb-1">${count}</div>
                        <p class="text-sm font-medium text-neutral-700 uppercase tracking-widest mb-0.5">${label}</p>
                        <p class="text-xs text-neutral-500 font-light tracking-wide">${sublabel}</p>
                    </div>
                </div>
            `;
        }

        function renderActiveRollCard(roll) {
            const progress = (roll.frames_shot / roll.total_frames) * 100;
            const remaining = roll.total_frames - roll.frames_shot;
            
            return `
                <div class="group border border-neutral-300 bg-[#fdfcf9] rounded-lg overflow-hidden relative hover:shadow-lg transition-all">
                    <!-- Film perforation -->
                    <div class="absolute left-0 top-0 bottom-0 w-3 bg-neutral-800 flex flex-col justify-around py-3 z-10">
                        ${Array(8).fill(0).map(() => '<div class="w-2 h-2 bg-[#fdfcf9] rounded-full mx-auto"></div>').join('')}
                    </div>
                    
                    <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                    
                    <div class="pl-6 pr-4 pt-4 pb-5 relative">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <div class="mb-2 inline-flex items-center gap-1.5 px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                    <span class="text-fuchsia-400">→</span>
                                    ${roll.roll_number}
                                </div>
                                <h3 class="text-lg font-medium text-neutral-900 mb-1">${roll.film_stock}</h3>
                                <p class="text-sm text-neutral-500 font-light">${getCameraName(roll.camera_id)}</p>
                            </div>
                            <div class="px-2.5 py-1 border-2 border-fuchsia-500 rounded-full text-fuchsia-600 font-mono text-xs font-bold tracking-wide rotate-2">
                                ISO ${roll.iso}
                            </div>
                        </div>
                        
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs uppercase tracking-widest text-neutral-400 font-medium">Frames</span>
                                <div class="flex items-baseline gap-1">
                                    <span class="font-mono text-xl font-bold text-neutral-900">${roll.frames_shot}</span>
                                    <span class="text-neutral-400 font-mono text-sm">/ ${roll.total_frames}</span>
                                </div>
                            </div>
                            
                            <div class="relative h-8 bg-neutral-200 rounded overflow-hidden border border-neutral-300">
                                <div class="absolute inset-y-0 left-0 bg-gradient-to-r from-neutral-700 to-neutral-800" style="width: ${progress}%"></div>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span class="text-[10px] font-mono text-neutral-400 font-medium tracking-wider">${remaining} REMAINING</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-neutral-300 opacity-60"></div>
                    </div>
                </div>
            `;
        }

        function renderCameras() {
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Camera Library</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Manage your camera collection</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${mockData.cameras.map(camera => `
                            <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-6 relative hover:shadow-md transition-all">
                                <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                                <div class="absolute top-0 left-0 right-0 h-1 bg-neutral-800"></div>
                                
                                <div class="relative">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex-1">
                                            <h3 class="text-xl font-medium text-neutral-900 mb-1">${camera.brand} ${camera.model}</h3>
                                            <div class="inline-flex items-center px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                                ${camera.format}
                                            </div>
                                        </div>
                                        <div class="w-12 h-12 bg-neutral-100 rounded-full flex items-center justify-center text-2xl">
                                            📷
                                        </div>
                                    </div>
                                    
                                    ${camera.notes ? `
                                        <div class="mb-4 pb-4 border-b border-neutral-200">
                                            <p class="text-sm text-neutral-600 italic">"${camera.notes}"</p>
                                        </div>
                                    ` : ''}
                                    
                                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-neutral-300 opacity-40 rounded-br-lg"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderActiveRolls() {
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Active Film Rolls</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Currently loaded film</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${mockData.activeRolls.map(roll => renderActiveRollCard(roll)).join('')}
                    </div>
                </div>
            `;
        }

        function renderInventory() {
            const totalRolls = mockData.inventory.reduce((sum, item) => sum + item.quantity, 0);
            
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Film Inventory</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">${totalRolls} rolls in stock</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${mockData.inventory.map(item => `
                            <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-5 relative hover:shadow-md transition-all">
                                <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                                
                                <div class="relative">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="flex-1">
                                            <h3 class="text-lg font-medium text-neutral-900 mb-1">${item.film_stock}</h3>
                                            <div class="flex gap-2 flex-wrap">
                                                <span class="inline-flex px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                                    ${item.format}
                                                </span>
                                                <span class="inline-flex px-2 py-0.5 border-2 border-fuchsia-500 text-fuchsia-600 font-mono text-[10px] tracking-wider font-bold rounded-full">
                                                    ISO ${item.iso}
                                                </span>
                                            </div>
                                        </div>
                                        <div class="flex flex-col items-end">
                                            <div class="text-3xl font-bold font-mono text-neutral-900">${item.quantity}</div>
                                            <div class="text-xs text-neutral-500 uppercase tracking-widest">in stock</div>
                                        </div>
                                    </div>
                                    
                                    <div class="text-sm text-neutral-600 mt-3 pt-3 border-t border-neutral-200">
                                        <span class="text-neutral-500">Frames per roll:</span> 
                                        <span class="font-medium font-mono">${item.frames_per_roll}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderArchive() {
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Archive</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Past film rolls and reference</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${mockData.archive.map(roll => `
                            <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg overflow-hidden relative hover:shadow-lg transition-all">
                                <div class="absolute left-0 top-0 bottom-0 w-3 bg-neutral-800 flex flex-col justify-around py-3 z-10">
                                    ${Array(8).fill(0).map(() => '<div class="w-2 h-2 bg-[#fdfcf9] rounded-full mx-auto"></div>').join('')}
                                </div>
                                
                                <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                                
                                <div class="pl-6 pr-4 pt-4 pb-5 relative">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="flex-1">
                                            <div class="mb-2 inline-flex items-center gap-1.5 px-2 py-0.5 bg-neutral-800 text-[#fdfcf9] font-mono text-[10px] tracking-wider">
                                                <span class="text-fuchsia-400">→</span>
                                                ${roll.roll_number}
                                            </div>
                                            <h3 class="text-lg font-medium text-neutral-900">${roll.film_stock}</h3>
                                            <p class="text-sm text-neutral-500 font-light">${getCameraName(roll.camera_id)}</p>
                                        </div>
                                        <span class="px-2.5 py-1 border-2 ${roll.status === 'developed' ? 'border-purple-300 bg-purple-100 text-purple-800' : 'border-blue-300 bg-blue-100 text-blue-800'} rounded-full text-xs font-bold">
                                            ${roll.status}
                                        </span>
                                    </div>
                                    
                                    <div class="text-xs text-neutral-500 mt-3">
                                        Completed ${new Date(roll.completed_date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderSoupRecipes() {
            return `
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8">
                        <div class="relative">
                            <div class="absolute -left-4 top-0 bottom-0 w-2 bg-neutral-800 rounded-sm opacity-20"></div>
                            <h1 class="text-4xl font-medium text-neutral-900 tracking-tight">Soup Recipes</h1>
                            <p class="text-neutral-600 mt-1.5 tracking-wide font-light">Experimental film processing</p>
                            <div class="mt-2 w-24 h-0.5 bg-fuchsia-500 rounded-full opacity-40"></div>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${mockData.soupRecipes.map(recipe => `
                            <div class="border border-neutral-300 bg-[#fdfcf9] rounded-lg p-5 relative hover:shadow-md transition-all">
                                <div class="paper-texture absolute inset-0 opacity-[0.02] pointer-events-none"></div>
                                <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-fuchsia-500 to-fuchsia-300"></div>
                                
                                <div class="relative">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="flex-1">
                                            <h3 class="text-lg font-medium text-neutral-900 mb-1">${recipe.name}</h3>
                                            <span class="inline-flex px-2 py-0.5 border border-neutral-300 rounded text-xs">${recipe.color_result}</span>
                                        </div>
                                        <span class="text-2xl">${recipe.favorite ? '⭐' : '☆'}</span>
                                    </div>
                                    
                                    <div class="flex gap-4 mb-4 text-sm text-neutral-600">
                                        <div class="flex items-center gap-1">
                                            <span>💧</span>
                                            <span>${recipe.soak_time_minutes} min soak</span>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <span>⏰</span>
                                            <span>${recipe.dry_time_hours}h dry</span>
                                        </div>
                                    </div>
                                    
                                    <div class="mb-4 pb-4 border-b border-neutral-200">
                                        <p class="text-xs uppercase tracking-widest text-neutral-500 mb-2">Ingredients</p>
                                        <div class="space-y-1">
                                            ${recipe.ingredients.map(ing => `
                                                <div class="text-sm text-neutral-700">• ${ing.amount} ${ing.item}</div>
                                            `).join('')}
                                        </div>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <p class="text-xs uppercase tracking-widest text-neutral-500 mb-2">Works with</p>
                                        <div class="flex flex-wrap gap-1">
                                            ${recipe.film_types.map(type => `
                                                <span class="inline-flex px-2 py-0.5 border border-neutral-300 rounded text-xs font-mono">${type}</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                    
                                    ${recipe.notes ? `
                                        <div class="pt-4 border-t border-neutral-200">
                                            <p class="text-sm text-neutral-600 italic">"${recipe.notes}"</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Initialize app
        renderNav();
        renderPage();
    </script>
</body>
</html>
